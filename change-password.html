<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>パスワード変更 | はじめてブログ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&family=Zen+Kaku+Gothic+New:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="page-auth">
    <main class="auth-page">
      <section class="auth-page__card panel">
       <nav class="top-nav top-nav--compact">
  <a href="index.html">ホーム</a>
  <a href="change-name.html">ユーザー名変更</a>
</nav>

        <p class="section-heading__eyebrow">SECURITY</p>
        <h1 class="auth-page__title">パスワード変更</h1>
        <p class="auth-page__text">
          新しいパスワードに変更します。
        </p>

        <form id="change-password-form" class="form">
          <label class="form__field">
            <span>今のパスワード</span>
            <div class="password-field">
              <input
                type="password"
                name="currentPassword"
                placeholder="今のパスワードを入力"
                required
              />
              <button type="button" class="password-toggle" data-password-toggle>
                表示
              </button>
            </div>
          </label>

          <label class="form__field">
            <span>新しいパスワード</span>
            <div class="password-field">
              <input
                type="password"
                name="newPassword"
                placeholder="6文字以上で入力"
                required
              />
              <button type="button" class="password-toggle" data-password-toggle>
                表示
              </button>
            </div>
          </label>

          <button type="submit" class="button button--primary button--full">
            パスワードを変更する
          </button>
        </form>

        <p id="account-message" class="message" aria-live="polite"></p>
      </section>
    </main>

       <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
  </body>
</html>
