<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ユーザー名変更 | はじめてブログ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&family=Zen+Kaku+Gothic+New:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="page-auth auth-guard">
    <main class="auth-page">
      <section class="auth-page__card panel">
       <nav class="top-nav top-nav--compact">
  <a href="index.html">ホーム</a>
</nav>

        <p class="section-heading__eyebrow">ACCOUNT</p>
        <h1 class="auth-page__title">ユーザー名変更</h1>
        <p class="auth-page__text">
          新しいユーザー名に変えると、これまでの投稿者名も新しい名前にそろいます。
        </p>

        <form id="change-name-form" class="form">
          <label class="form__field">
            <span>今のユーザー名</span>
            <input type="text" id="current-name" disabled />
          </label>

          <label class="form__field">
            <span>新しいユーザー名</span>
            <input
              type="text"
              name="newUserName"
              placeholder="新しい名前を入力"
              required
            />
          </label>

          <button type="submit" class="button button--primary button--full">
            ユーザー名を変更する
          </button>
        </form>

        <p id="account-message" class="message" aria-live="polite"></p>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
  </body>
</html>
