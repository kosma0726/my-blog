<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ログイン | はじめてブログ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&family=Zen+Kaku+Gothic+New:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="page-auth">
    <main class="auth-page">
      <section class="auth-page__card panel">
        <nav class="top-nav top-nav--compact">
          <a href="index.html">ホーム</a>
          <a href="register.html">新規登録</a>
          <a href="login.html">ログイン</a>
        </nav>
        <p class="section-heading__eyebrow">LOGIN</p>
        <h1 class="auth-page__title">ログイン</h1>
        <p class="auth-page__text">
          登録したメールアドレスとパスワードを入れて、ブログに入ります。
        </p>

        <form id="login-form" class="form">
          <label class="form__field">
            <span>メールアドレス</span>
            <input
              type="email"
              name="loginEmail"
              placeholder="登録したメールアドレスを入力"
              required
            />
          </label>

          <label class="form__field">
            <span>パスワード</span>
            <div class="password-field">
              <input
                type="password"
                name="loginPassword"
                placeholder="登録したパスワードを入力"
                required
              />
              <button type="button" class="password-toggle" data-password-toggle>
                表示
              </button>
            </div>
          </label>

          <button type="submit" class="button button--primary button--full">
            ログインする
          </button>
        </form>

        <p id="auth-message" class="message" aria-live="polite"></p>
        <p class="auth-page__switch">
          まだアカウントがない人は <a href="register.html">新規登録ページ</a> へ
        </p>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
  </body>
</html>
