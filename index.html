<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>はじめてぶろぐ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&family=Zen+Kaku+Gothic+New:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="page-app auth-guard">
    <header class="hero">
      <div class="hero__inner">
      <nav class="top-nav">
  <a href="index.html">ホーム</a>
  <a href="account-settings.html">登録情報変更</a>
  <button type="button" id="logout-button" class="button button--ghost top-nav__logout">
    ログアウト
  </button>
</nav>

        <p class="hero__tag">SUPER BEGINNER FRIENDLY</p>
        <h1>はじめてぶろぐ</h1>
        <p class="hero__text">
          気軽に記事を投稿したり、みんなの投稿を楽しめるシンプルなブログ機能です。
        </p>
      </div>
    </header>

    <main class="container">
      <section class="guide">
        <div class="guide__card">
          <h2>使い方は3ステップ</h2>
          <ol>
            <li>ログインした状態で開く</li>
            <li>記事を書く</li>
            <li>投稿して一覧で見る</li>
          </ol>
        </div>
        <div class="guide__card guide__card--accent">
          <h2>大事なお知らせ</h2>
          <ul>
            <li>投稿データはオンラインで共有されます</li>
            <li>アカウント情報はこのブラウザに保存されます</li>
            <li>学習用のブログサービスです</li>
          </ul>
        </div>
      </section>

      <section class="composer" id="post-form">
        <div class="section-heading">
          <p class="section-heading__eyebrow">WRITE</p>
          <h2>新しい記事を書く</h2>
        </div>

        <form id="blog-form" class="form">
          <label class="form__field">
            <span>タイトル</span>
            <input
              type="text"
              id="title"
              name="title"
              placeholder="例：今日うれしかったこと"
              required
            />
          </label>

          <label class="form__field">
            <span>ひとこと説明</span>
            <input
              type="text"
              id="summary"
              name="summary"
              placeholder="例：はじめてブログを書いた日の記録"
              required
            />
          </label>

          <label class="form__field">
            <span>本文</span>
            <textarea
              id="content"
              name="content"
              rows="8"
              placeholder="ここに自由に文章を書いてください。"
              required
            ></textarea>
          </label>

          <button type="submit" class="button button--primary button--full">
            投稿する
          </button>
          <p id="post-message" class="message" aria-live="polite"></p>
        </form>
      </section>

      <section class="posts" id="posts">
        <div class="section-heading">
          <p class="section-heading__eyebrow">POSTS</p>
          <h2>投稿一覧</h2>
        </div>
        <div class="posts-toolbar">
          <div class="filter-tabs" id="post-filter-tabs">
            <button type="button" class="filter-tab is-active" data-filter="all">
              全員の投稿
            </button>
            <button type="button" class="filter-tab" data-filter="friends">
              フレンドと自分の投稿
            </button>
            <button type="button" class="filter-tab" data-filter="mine">
              自分の投稿
            </button>
          </div>

          <div class="friend-panel">
            <form id="friend-form" class="friend-form">
              <input
                type="text"
                name="friendName"
                placeholder="フレンドのユーザー名を追加"
              />
              <button type="submit" class="button button--ghost">フレンド追加</button>
            </form>
            <p id="friend-message" class="message" aria-live="polite"></p>
            <div id="friend-list" class="friend-list"></div>
          </div>
        </div>
        <div id="post-list" class="post-list"></div>
      </section>
    </main>

    <footer class="footer">
      <p>はじめてぶろぐ | 自分の言葉を気軽に残そう</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
  </body>
</html>
